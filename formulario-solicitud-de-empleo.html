<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Solicitud de Empleo</title>
    <link rel="stylesheet" href="hoja-de-estilos.css">
</head>
<body>
    <div class="container">

        <form>

            <label for="name">Name:</label>
            <input type="text" id="name"
                placeholder="Name complete" required>

            <label for="email">Email:</label>
            <input type="email" id="email"
                placeholder="Email address" required>

            <label for="position">Position:</label>
            <select id="position" required>
                    <option value="">Select position</option>
                    <option value="developer">Developer</option>
                    <option value="designer">Designer</option>
                    <option value="manager">Manager</option>
                </select>    

            <fieldset class="radio-group" >
                <legend>Availability</legend>
                <input type="radio" id="full-time" name="availability" >
                <label for="full-time">Full-time</label>

                <input type="radio" id="part-time" name="availability">
                <label for="part-time">Part-time</label>

                <input type="radio" id="freelance" name="availability">
                <label for="freelance">Freelance</label>

                <label for="message">Message:</label>
                <textarea id="message" placeholder="Enter your message here..." ></textarea> 

                <button type="submit">Submit</button>

            </fieldset>

                    
        </form>

    </div>



</html>
